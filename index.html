<style>

  input{width:100%;font-family:inherit;font-size:15px;padding:11px 12px;border:1px solid var(--ink);background:#fff;color:var(--ink)}
  input:focus{outline:2px solid var(--accent);outline-offset:-1px}
  button{margin-top:14px;width:100%;font-family:inherit;font-size:14px;font-weight:700;letter-spacing:.06em;
    padding:12px;background:var(--black);color:#fff;border:none;cursor:pointer}
  button:hover{opacity:.85}button:active{transform:scale(.99)}
  .err{color:#a3402a;font-size:12.5px;margin-top:12px;min-height:1em;font-weight:600}
  .foot{padding:16px 24px;font-size:11px;color:var(--sub);text-align:center}
</style>
