<style>
  :root{--ink:#15181c;--sub:#6b7077;--accent:#2b5fd9;--line:#e6e6e3;--black:#0e0f11}

  body{font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN","Noto Sans JP","Yu Gothic Medium",sans-serif;

  label{display:block;font-size:11px;font-weight:700;letter-spacing:.12em;color:var(--sub);margin-bottom:6px}
  input{width:100%;font-family:inherit;font-size:15px;padding:11px 12px;border:1px solid var(--ink);background:#fff;color:var(--ink)}
  input:focus{outline:2px solid var(--accent);outline-offset:-1px}
  button{margin-top:14px;width:100%;font-family:inherit;font-size:14px;font-weight:700;letter-spacing:.06em;
    padding:12px;background:var(--black);color:#fff;border:none;cursor:pointer}
  button:hover{opacity:.85}button:active{transform:scale(.99)}
  .err{color:#a3402a;font-size:12.5px;margin-top:12px;min-height:1em;font-weight:600}
  .foot{padding:16px 24px;font-size:11px;color:var(--sub);text-align:center}
</style>

  document.getElementById('f').addEventListener('submit',async function(e){

    var err=document.getElementById('err');err.textContent='';
    var pw=document.getElementById('pw').value;
    try{
      var base=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
      var key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b(SALT),iterations:ITER,hash:'SHA-256'},base,{name:'AES-GCM',length:256},false,['decrypt']);

      document.open();document.write(html);document.close();

      document.getElementById('pw').select();
    }
